<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Webpage Project</title>

    <style>
        /* ===== TAG SELECTORS ===== */
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f0f8ff;
        }

        header {
            background-color: #2e7d32;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #4caf50;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        section {
            display: flex;
            margin: 15px;
        }

        article {
            flex: 3;
            background: white;
            padding: 20px;
            margin-right: 10px;
        }

        aside {
            flex: 1;
            background: #c8e6c9;
            padding: 20px;
        }

        footer {
            background-color: #2e7d32;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* ===== CLASS SELECTOR ===== */
        .highlight {
            color: green;
            font-weight: bold;
        }

        /* ===== ID SELECTOR ===== */
        #main-title {
            font-size: 30px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<header>
    <h1 id="main-title">My Webpage Project</h1>
    <p class="highlight">HTML, CSS, and JavaScript</p>
</header>

<!-- NAVIGATION -->
<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
</nav>

<!-- SECTION -->
<section>

    <!-- ARTICLE -->
    <article>
        <h2>Student Info</h2>

        <!-- PART II A: VARIABLES OUTPUT -->
        <p id="studentInfo"></p>

        <!-- PART II B: BUTTON FUNCTION -->
        <button onclick="showAlert()">Click Me</button>

        <br><br>

        <!-- PART II C: USER INPUT -->
        <input type="text" id="userInput" placeholder="Enter something">
        <button onclick="displayInput()">Submit</button>

        <p id="output"></p>

        <!-- PART II D: EVENT HANDLING -->
        <button id="changeTextBtn">Change Content</button>
        <p id="dynamicText">Original Content</p>

    </article>

    <!-- ASIDE -->
    <aside>
        <h3>Sidebar</h3>
        <p>Additional Info Here</p>
    </aside>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 My Project</p>
</footer>

<!-- ===== JAVASCRIPT ===== -->
<script>
    // PART II A: VARIABLES
    let name = "Your Name";
    let course = "BSIT";

    document.getElementById("studentInfo").innerHTML =
        "Name: " + name + "<br>Course: " + course;

    // PART II B: FUNCTION
    function showAlert() {
        alert("Button Clicked!");
    }

    // PART II C: USER INPUT
    function displayInput() {
        let input = document.getElementById("userInput").value;
        document.getElementById("output").innerHTML = "You entered: " + input;
    }

    // PART II D: EVENT HANDLING
    document.getElementById("changeTextBtn").addEventListener("click", function() {
        document.getElementById("dynamicText").innerHTML = "Content Changed!";
    });
</script>

<!--

Neocities: https://yourusername.neocities.org/
-->

</body>
</html>
